name: Build macOS Dev App

on:
  workflow_dispatch:

jobs:
  build-macos-dev:
    runs-on: macos-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download model files
        shell: bash
        run: |
          echo "Downloading model files from GitHub release..."
          mkdir -p analyzer/models

          curl -L -o analyzer/models/sam_hq_vit_tiny.pth \
            "https://huggingface.co/lkeab/hq-sam/resolve/main/sam_hq_vit_tiny.pth"

          echo "Verifying download..."
          if [ ! -f analyzer/models/sam_hq_vit_tiny.pth ]; then
            echo "ERROR: sam_hq_vit_tiny.pth not found after download"
            exit 1
          fi
          FILE_SIZE=$(stat -f%z analyzer/models/sam_hq_vit_tiny.pth 2>/dev/null || stat -c%s analyzer/models/sam_hq_vit_tiny.pth)
          echo "Downloaded file size: ${FILE_SIZE} bytes"
          if [ "${FILE_SIZE}" -lt 20000000 ]; then
            echo "ERROR: Downloaded file too small (${FILE_SIZE} bytes)"
            exit 1
          fi
          echo "Contents of analyzer/models/:"
          ls -lh analyzer/models/

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Create venv and install dependencies
        shell: bash
        run: |
          python -m venv .venv2
          source .venv2/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements-macos.txt
          pip install pyinstaller

      - name: Run macOS headless build
        shell: bash
        run: |
          chmod +x packaging/build_app_headless.sh
          ./packaging/build_app_headless.sh

      - name: Smoke test built executable (first 2 test images)
        shell: bash
        run: |
          set -euo pipefail
          SMOKE_DIR="${RUNNER_TEMP}/kestrel-smoke-input"
          rm -rf "${SMOKE_DIR}"
          mkdir -p "${SMOKE_DIR}"

          mapfile -t smoke_imgs < <(find test_imgs -maxdepth 1 -type f | sort | head -n 2)
          if [ "${#smoke_imgs[@]}" -lt 2 ]; then
            echo "Expected at least 2 images in test_imgs/ for smoke test"
            exit 1
          fi

          for img in "${smoke_imgs[@]}"; do
            cp "${img}" "${SMOKE_DIR}/"
          done

          analyzer/dist/ProjectKestrel/ProjectKestrel --cli "${SMOKE_DIR}" --no-gpu --parallel-prefetch 1

          META_PATH="${SMOKE_DIR}/.kestrel/metadata.csv"
          if [ ! -f "${META_PATH}" ]; then
            echo "Smoke test did not produce metadata.csv"
            exit 1
          fi
          PROCESSED_ROWS=$(( $(wc -l < "${META_PATH}") - 1 ))
          if [ "${PROCESSED_ROWS}" -lt 2 ]; then
            echo "Smoke test processed fewer than 2 images (rows=${PROCESSED_ROWS})"
            exit 1
          fi

      - name: Collect macOS .app
        shell: bash
        run: |
          set -e
          mkdir -p artifact
          APP_PATH=$(find analyzer/dist -maxdepth 2 -name "*.app" | head -n 1 || true)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find release -type d -name "*.app" | head -n 1 || true)
          fi
          if [ -z "$APP_PATH" ]; then
            echo "No .app found to upload"
            exit 1
          fi
          echo "Found .app: $APP_PATH"
          cp -a "$APP_PATH" artifact/

      - name: Upload macOS dev app
        uses: actions/upload-artifact@v4
        with:
          name: macos-dev-app
          path: artifact/
