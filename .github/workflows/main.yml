name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-installer:
    runs-on: windows-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Locate makeappx.exe
        id: find_makeappx
        shell: powershell
        run: |
          Write-Host 'Searching for makeappx.exe in common Windows SDK locations...'
          Write-Host ''

          $locations = @(
            'C:\Program Files (x86)\Windows Kits\10\bin\x64\makeappx.exe',
            'C:\Program Files (x86)\Windows Kits\11\bin\x64\makeappx.exe',
            'C:\Program Files\Windows Kits\10\bin\x64\makeappx.exe',
            'C:\Program Files\Windows Kits\11\bin\x64\makeappx.exe',
            'C:\Program Files (x86)\Windows Kits\10\bin\10.0.19041.0\x64\makeappx.exe',
            'C:\Program Files (x86)\Windows Kits\11\bin\11.0.0.0\x64\makeappx.exe',
            'C:\Program Files (x86)\Windows Kits\10\App Certification Kit\makeappx.exe'
          )

          $foundPaths = @()
          foreach ($location in $locations) {
            Write-Host "  Checking: $location"
            if (Test-Path $location) {
              Write-Host '    Found (standard)'
              $foundPaths += (Get-Item $location).FullName
            }
          }

          if ($foundPaths.Count -eq 0 -and (Test-Path 'C:\Program Files (x86)\Windows Kits')) {
            Write-Host ''
            Write-Host 'No standard hits; searching Windows Kits recursively for makeappx.exe (this may take a moment)...'
            Get-ChildItem -Recurse 'C:\Program Files (x86)\Windows Kits' -Filter 'makeappx.exe' -ErrorAction SilentlyContinue | ForEach-Object {
              Write-Host ("  Found: $($_.FullName)")
              $foundPaths += $_.FullName
            }
          }

          if ($foundPaths.Count -eq 0) {
            Write-Host ''
            Write-Host 'No makeappx.exe found on runner.'
          } else {
            Write-Host ''
            Write-Host 'Evaluating preferred makeappx.exe candidate...'

            # Prefer versioned x64 path under a \bin\<version>\x64\makeappx.exe
            $preferred = $foundPaths | Where-Object { $_ -match '\\bin\\[^\\]+\\x64\\makeappx.exe$' } | Select-Object -First 1

            # Fallback: any x64 in a bin folder
            if (-not $preferred) {
              $preferred = $foundPaths | Where-Object { $_ -match '\\bin\\x64\\makeappx.exe$' } | Select-Object -First 1
            }

            # If multiple candidates, exclude App Certification Kit entry if others exist
            if ($foundPaths.Count -gt 1) {
              $nonCert = $foundPaths | Where-Object { $_ -notmatch 'App Certification Kit' }
              if ($nonCert.Count -gt 0) { $foundPaths = $nonCert }
            }

            $choice = $preferred
            if (-not $choice) { $choice = $foundPaths[0] }

            Write-Host ("Selected: $choice")
            Add-Content -Path $env:GITHUB_OUTPUT -Value ("makeappx=$choice")

            # Add the directory containing makeappx.exe to PATH for subsequent steps
            $dir = Split-Path $choice
            Add-Content -Path $env:GITHUB_PATH -Value $dir
            Write-Host ("Added $dir to PATH for later steps")
          }

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create venv and install dependencies
        shell: powershell
        run: |
          python -m venv .venv2
          .\.venv2\Scripts\Activate.ps1
          python -m pip install --upgrade pip
          # Windows build uses onnxruntime-directml (DirectML GPU acceleration).
          # See requirements-windows.txt.
          pip install -r requirements-windows.txt
          pip install pyinstaller

      - name: Build ProjectKestrel with PyInstaller
        shell: cmd
        run: packaging\build_installer_headless.bat

      - name: Smoke test built executable (first 2 test images)
        id: smoke_test
        continue-on-error: true
        shell: powershell
        run: |
          $smokeDir = Join-Path $env:RUNNER_TEMP "kestrel-smoke-input"
          Remove-Item -Recurse -Force $smokeDir -ErrorAction Ignore
          New-Item -ItemType Directory -Path $smokeDir | Out-Null

          $images = Get-ChildItem -Path "test_imgs" -File | Sort-Object Name | Select-Object -First 2
          if ($images.Count -lt 2) {
            throw "Expected at least 2 images in test_imgs/ for smoke test"
          }

          foreach ($img in $images) {
            Copy-Item $img.FullName -Destination $smokeDir
          }

          & "analyzer\dist\ProjectKestrel\ProjectKestrel.exe" --cli $smokeDir --no-gpu --parallel-prefetch 1

          $metadataPath = Join-Path $smokeDir ".kestrel\metadata.csv"
          if (!(Test-Path $metadataPath)) {
            throw "Smoke test did not produce metadata.csv"
          }
          $processedRows = (Get-Content $metadataPath | Measure-Object -Line).Lines - 1
          if ($processedRows -lt 2) {
            throw "Smoke test processed fewer than 2 images (rows=$processedRows)"
          }

      - name: Warn if smoke test failed
        if: ${{ always() && steps.smoke_test.outcome == 'failure' }}
        shell: powershell
        run: Write-Host "::warning::Smoke test failed on Windows installer build; continuing to publish available artifacts."

      - name: Create MSIX package
        shell: powershell
        run: |
          Write-Host 'Preparing MSIX staging folder...'
          Remove-Item -Recurse -Force "analyzer\msix" -ErrorAction Ignore
          New-Item -ItemType Directory -Force -Path "analyzer\msix" | Out-Null
          New-Item -ItemType Directory -Force -Path "analyzer\msix\Assets\Squares" | Out-Null

          # Copying files
          Copy-Item -Recurse "analyzer\dist\ProjectKestrel" "analyzer\msix\ProjectKestrel"
          Copy-Item "packaging\ProjectKestrel.appxmanifest" "analyzer\msix\AppxManifest.xml" -Force
          Copy-Item "assets\StoreLogo.png"                 "analyzer\msix\Assets\StoreLogo.png"
          Copy-Item "assets\SplashScreen.png"              "analyzer\msix\Assets\SplashScreen.png"
          Copy-Item "assets\Wide310x150Logo.png"           "analyzer\msix\Assets\Wide310x150Logo.png"
          Copy-Item "assets\squares\Square44x44Logo.png"   "analyzer\msix\Assets\Squares\Square44x44Logo.png"
          Copy-Item "assets\squares\Square150x150Logo.png" "analyzer\msix\Assets\Squares\Square150x150Logo.png"

          $makeappx = "${{ steps.find_makeappx.outputs.makeappx }}"

          if ($makeappx -and (Test-Path "$makeappx")) {
              Write-Host "Using makeappx from: $makeappx"

              if (!(Test-Path "dist\installer")) {
                  New-Item -ItemType Directory -Force -Path "dist\installer" | Out-Null
              }

              # Step 1 - Create the .msix as before
              Write-Host 'Creating MSIX package...'
              & "$makeappx" pack /d "analyzer\msix" /p "dist\installer\ProjectKestrel.msix" /o
              Write-Host 'MSIX created at dist\installer\ProjectKestrel.msix'

              # Step 2 - Create a bundle staging folder containing just the .msix
              New-Item -ItemType Directory -Force -Path "dist\installer\bundle_staging" | Out-Null
              Copy-Item "dist\installer\ProjectKestrel.msix" "dist\installer\bundle_staging\ProjectKestrel.msix"

              # Step 3 - Wrap into a .msixbundle
              Write-Host 'Creating MSIX bundle...'
              & "$makeappx" bundle /d "dist\installer\bundle_staging" /p "dist\installer\ProjectKestrel.msixbundle" /o
              Write-Host 'MSIX bundle created at dist\installer\ProjectKestrel.msixbundle'

          } else {
              Write-Host 'ERROR: makeappx.exe not found. MSIX packaging skipped.'
              Write-Host "Path attempted: $makeappx"
              exit 1
          }

      - name: Upload MSIX package
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: windows-msix
          path: dist/installer/ProjectKestrel.msix

      - name: Upload MSIX bundle
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: windows-msixbundle
          path: dist/installer/ProjectKestrel.msixbundle

      - name: Install Inno Setup 6
        shell: powershell
        run: |
          Invoke-WebRequest -Uri https://jrsoftware.org/download.php/is.exe -OutFile is.exe
          Start-Process -FilePath .\is.exe -ArgumentList "/VERYSILENT","/SUPPRESSMSGBOXES","/NORESTART","/SP-" -Wait
          if (-not (Test-Path "C:\Program Files (x86)\Inno Setup 6\ISCC.exe")) {
            throw "Inno Setup not found after install"
          }
          Write-Host "Inno Setup 6 installed."

      - name: Build ProjectKestrel Installer
        shell: cmd
        run: packaging\build_installer_headless_part2.bat

      - name: Upload Windows installer
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/installer/*.exe

      - name: Upload ProjectKestrel onedir bundle
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: windows-bundle
          path: analyzer/dist/ProjectKestrel/
